<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>My Notes - Sticky Notes</title>
    <link rel="stylesheet" href="sidebar.css" />
    <link rel="stylesheet" href="notes.css" />
    <link
      rel="stylesheet"
      href="https://cdn-uicons.flaticon.com/3.0.0/uicons-regular-rounded/css/uicons-regular-rounded.css"
    />
  </head>
  <body>
    <div class="app-layout">
      <!-- Global Sidebar Injected Here -->
      <aside id="app-sidebar"></aside>

      <main class="app-main" style="flex-direction: row; overflow: hidden;">
        <!-- Secondary Sidebar: Notes List -->
        <aside class="notes-sidebar">
          <div class="sidebar-header" style="justify-content: space-between;">
            <h2 style="margin: 0;">My Notes</h2>
            <button id="new-note-btn" title="New Note" style="background: none; border: none; cursor: pointer; color: var(--text-secondary);">
              <i class="fi fi-rr-plus"></i>
            </button>
          </div>
          <div class="notes-list" id="notes-list" style="flex: 1; overflow-y: auto;">
            <!-- List of notes will be populated here -->
          </div>
        </aside>

        <!-- Main Editor Area -->
        <main class="main-editor" style="flex: 1; border-left: 1px solid var(--sidebar-border);">
          <div id="editor-placeholder">
            <h2>Select a note or create a new one</h2>
            <p>Your personal space for thoughts, ideas, and plans.</p>
          </div>
          <div id="editor-content" class="hidden">
            <input type="text" id="note-title-input" placeholder="Untitled" />
            <div
              id="note-editor"
              contenteditable="true"
              data-placeholder="Start writing..."
            ></div>
          </div>
          <div id="slash-command-menu" class="hidden"></div>
          <div id="floating-toolbar" class="hidden">
            <button data-command="bold" title="Bold">
              <i class="fi fi-rr-bold"></i>
            </button>
            <button data-command="italic" title="Italic">
              <i class="fi fi-rr-italic"></i>
            </button>
            <button data-command="underline" title="Underline">
              <i class="fi fi-rr-underline"></i>
            </button>
            <button data-command="strikeThrough" title="Strikethrough">
              <i class="fi fi-rr-strikethrough"></i>
            </button>
          </div>
        </main>
      </main>
    </div>
    
    <script type="module" src="notes.js"></script>
  </body>
</html>
