<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Account</title>
    <link rel="stylesheet" href="sidebar.css">
    <link rel="stylesheet" href="https://cdn-uicons.flaticon.com/uicons-regular-rounded/css/uicons-regular-rounded.css">
    <style>
      .account-content {
        display: flex;
        justify-content: center;
        align-items: center;
        flex: 1;
        padding: 32px;
      }
      .card {
        width: 100%;
        max-width: 420px;
        background: #ffffff;
        border: 1px solid rgba(0, 0, 0, 0.06);
        border-radius: 16px;
        padding: 32px;
      }
      .card h1 {
        font-size: 1.25rem;
        font-weight: 600;
        margin: 0 0 8px;
        letter-spacing: -0.02em;
        color: #0a0a0a;
      }
      .card p {
        margin: 0 0 24px;
        color: #6b7280;
        line-height: 1.6;
        font-size: 0.875rem;
      }
      .row {
        display: flex;
        flex-direction: column;
        gap: 10px;
      }
      .row button {
        border: none;
        background: #0a0a0a;
        color: #ffffff;
        padding: 10px 16px;
        border-radius: 10px;
        cursor: pointer;
        font-weight: 500;
        font-size: 0.8125rem;
        transition: background 0.2s cubic-bezier(0.16, 1, 0.3, 1);
        font-family: inherit;
      }
      .row button:hover {
        background: #262626;
      }
      .row button.secondary {
        background: #ffffff;
        color: #0a0a0a;
        border: 1px solid rgba(0, 0, 0, 0.08);
      }
      .row button.secondary:hover {
        background: rgba(0, 0, 0, 0.02);
        border-color: rgba(0, 0, 0, 0.12);
      }
      .status {
        margin-top: 20px;
        padding: 12px;
        border-radius: 10px;
        background: rgba(0, 0, 0, 0.02);
        border: 1px solid rgba(0, 0, 0, 0.06);
        font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
        font-size: 0.75rem;
        white-space: pre-wrap;
        color: #374151;
        text-align: center;
        line-height: 1.5;
      }
      .ok {
        background: #f0fdf4;
        border-color: #bbf7d0;
        color: #166534;
      }
      .warn {
        background: #fffbeb;
        border-color: #fef3c7;
        color: #92400e;
      }
      .hidden {
        display: none !important;
      }
    </style>
  </head>
  <body>
    <div class="app-layout">
      <!-- Global Sidebar Injected Here -->
      <aside id="app-sidebar"></aside>

      <main class="app-main">
        <div class="account-content">
          <div class="card">
            <h1>Account</h1>
            <p>
              Sign in with Google to enable cloud sync, migration ownership, and team
              features.
            </p>

          <div class="row">
            <button id="google-btn">Sign in with Google</button>
            <button id="signout-btn" class="secondary">Sign out</button>
            <button id="admin-btn" class="secondary hidden">Admin Backend</button>
            <button id="open-supabase-btn" class="secondary">
              Open Supabase project
            </button>
          </div>

          <div id="status" class="status">Checking session…</div>
        </div>
        </div>
      </main>
    </div>

    <script type="module" src="account.js"></script>
  </body>
</html>
